name: CI/CD — Web

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'docker-compose.yml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'index.html'

jobs:
  validate:
    name: Validate index.html
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check index.html exists and is non-empty
        run: |
          test -s index.html || (echo "index.html missing or empty" && exit 1)
          echo "index.html OK ($(wc -c < index.html) bytes)"

  deploy:
    name: Deploy to GCI VM
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copy index.html to VM
        run: |
          scp -i ~/.ssh/deploy_key \
            index.html \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/MISEIA1-6-10-revproxy-c/index.html

      - name: Restart web container
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ~/MISEIA1-6-10-revproxy-c && docker compose restart revproxy-web"

      - name: Smoke test
        run: |
          sleep 5
          STATUS=$(curl -sk -o /dev/null -w '%{http_code}' --max-time 15 https://revproxy.deviaaps.com/)
          echo "HTTP status: $STATUS"
          test "$STATUS" = "200" || (echo "Smoke test failed" && exit 1)
