[global]
workers            = 4
connect_timeout_ms = 5000
read_timeout_ms    = 30000
log_level          = "info"
forwarded_for      = true

[[listener]]
port = 8080
tls  = false

[[route]]
domain   = "api.test"
backends = ["127.0.0.1:9001", "127.0.0.1:9002"]

[[route]]
domain   = "web.test"
backends = ["127.0.0.1:9003", "127.0.0.1:9004"]

[[route]]
domain   = "admin.test"
backends = ["127.0.0.1:9005", "127.0.0.1:9006"]

[[route]]
domain   = "*"
backends = ["127.0.0.1:9000"]
